action:
  title: embed action
  description: Test passing args to Dockerfile

runtime:
  type: container
  image: ${IMAGE_REGISTRY}/testimage-embed:latest
  build:
    context: ./
    args:
      USER_ID: {{ .current_uid }}
      GROUP_ID: {{ .current_gid }}
      USER_NAME: foobar
  command:
    - sh
    - /action/main.sh
