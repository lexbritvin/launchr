name: Windows Docker with Linux Sidecar

on:
  workflow_dispatch:

env:
  DOCKER_CERT_PATH: /tmp/docker-certs
  DOCKER_HOST: tcp://localhost:2376
  DOCKER_TLS_VERIFY: 1
  SERVEO_SUBDOMAIN: my-app-${{ github.run_id }}

jobs:
  # Linux sidecar job for port forwarding
  sidecar:
    runs-on: ubuntu-latest
    outputs:
      tunnel-url: ${{ steps.setup-tunnel.outputs.tunnel-url }}
      docker-host: ${{ steps.setup-docker.outputs.docker-host }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker daemon for remote access
        id: setup-docker
        run: |
          # Create directory for Docker certificates
          sudo mkdir -p $DOCKER_CERT_PATH
          
          # Generate certificates for Docker daemon
          cd $DOCKER_CERT_PATH
          
          # Generate CA private key
          sudo openssl genrsa -out ca-key.pem 4096
          
          # Generate CA certificate
          sudo openssl req -new -x509 -days 365 -key ca-key.pem -sha256 -out ca.pem -subj "/C=US/ST=State/L=City/O=Org/CN=docker-ca"
          
          # Generate server private key
          sudo openssl genrsa -out server-key.pem 4096
          
          # Generate server certificate signing request
          sudo openssl req -subj "/C=US/ST=State/L=City/O=Org/CN=docker-server" -sha256 -new -key server-key.pem -out server.csr
          
          # Generate server certificate
          echo subjectAltName = DNS:localhost,IP:127.0.0.1,IP:0.0.0.0 | sudo tee extfile.cnf
          echo extendedKeyUsage = serverAuth | sudo tee -a extfile.cnf
          sudo openssl x509 -req -days 365 -sha256 -in server.csr -CA ca.pem -CAkey ca-key.pem -out server-cert.pem -extfile extfile.cnf -CAcreateserial
          
          # Generate client private key
          sudo openssl genrsa -out key.pem 4096
          
          # Generate client certificate signing request
          sudo openssl req -subj "/C=US/ST=State/L=City/O=Org/CN=docker-client" -new -key key.pem -out client.csr
          
          # Generate client certificate
          echo extendedKeyUsage = clientAuth | sudo tee extfile-client.cnf
          sudo openssl x509 -req -days 365 -sha256 -in client.csr -CA ca.pem -CAkey ca-key.pem -out cert.pem -extfile extfile-client.cnf -CAcreateserial
          
          # Set proper permissions
          sudo chmod 400 ca-key.pem key.pem server-key.pem
          sudo chmod 444 ca.pem server-cert.pem cert.pem
          
          # Configure Docker daemon for TLS
          sudo mkdir -p /etc/docker
          echo '{
            "hosts": ["unix:///var/run/docker.sock", "tcp://0.0.0.0:2376"],
            "tls": true,
            "tlscert": "'$DOCKER_CERT_PATH'/server-cert.pem",
            "tlskey": "'$DOCKER_CERT_PATH'/server-key.pem",
            "tlsverify": true,
            "tlscacert": "'$DOCKER_CERT_PATH'/ca.pem"
          }' | sudo tee /etc/docker/daemon.json
          
          # Restart Docker daemon
          sudo systemctl restart docker
          sudo systemctl enable docker
          
          # Wait for Docker daemon to be ready
          sleep 10
          
          echo "docker-host=tcp://localhost:2376" >> $GITHUB_OUTPUT

      - name: Setup serveo.net tunnel
        id: setup-tunnel
        run: |
          # Install SSH client if not available
          which ssh || sudo apt-get update && sudo apt-get install -y openssh-client
          
          # Start serveo.net tunnel in background for Docker daemon port
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -R $SERVEO_SUBDOMAIN:2376:localhost:2376 serveo.net &
          TUNNEL_PID=$!
          echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV
          
          # Wait a moment for tunnel to establish
          sleep 5
          
          # Get the tunnel URL
          TUNNEL_URL="tcp://$SERVEO_SUBDOMAIN.serveo.net:2376"
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT
          echo "Tunnel established: $TUNNEL_URL"

      - name: Upload Docker certificates
        uses: actions/upload-artifact@v4
        with:
          name: docker-certs
          path: /tmp/docker-certs/
          retention-days: 1

      - name: Keep sidecar alive
        run: |
          echo "Sidecar job running. Tunnel URL: ${{ steps.setup-tunnel.outputs.tunnel-url }}"
          echo "Docker daemon accessible at: ${{ steps.setup-tunnel.outputs.docker-host }}"
          
          # Keep the job alive for the duration of the workflow
          # This will run until the workflow is cancelled or times out
          while true; do
            echo "Sidecar alive at $(date)"
          
            # Check if tunnel is still active
            if ! kill -0 $TUNNEL_PID 2>/dev/null; then
              echo "Tunnel process died, restarting..."
              ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -R $SERVEO_SUBDOMAIN:2376:localhost:2376 serveo.net &
              TUNNEL_PID=$!
              echo "TUNNEL_PID=$TUNNEL_PID" >> $GITHUB_ENV
            fi
          
            # Check Docker daemon status
            if ! sudo systemctl is-active --quiet docker; then
              echo "Docker daemon is not running, restarting..."
              sudo systemctl restart docker
            fi
          
            sleep 30
          done

  # Windows job with Docker for Linux containers
  windows-docker:
    runs-on: windows-latest
    needs: sidecar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Docker Linux containers on Windows
        run: |
          # Switch Docker to Linux containers mode
          & "C:\Program Files\Docker\Docker\DockerCli.exe" -SwitchLinuxEngine
          
          # Wait for Docker to switch
          Start-Sleep -Seconds 30
          
          # Verify Docker is running
          docker version

      - name: Download Docker certificates
        uses: actions/download-artifact@v4
        with:
          name: docker-certs
          path: C:\docker-certs

      - name: Configure Docker client for remote connection
        run: |
          # Set environment variables for Docker client
          $env:DOCKER_HOST = "${{ needs.sidecar.outputs.tunnel-url }}"
          $env:DOCKER_CERT_PATH = "C:\docker-certs"
          $env:DOCKER_TLS_VERIFY = "1"
          
          # Make environment variables persistent for this job
          echo "DOCKER_HOST=${{ needs.sidecar.outputs.tunnel-url }}" >> $env:GITHUB_ENV
          echo "DOCKER_CERT_PATH=C:\docker-certs" >> $env:GITHUB_ENV
          echo "DOCKER_TLS_VERIFY=1" >> $env:GITHUB_ENV
          
          # Test connection to remote Docker daemon
          docker version
          docker info

      - name: Run Docker containers
        run: |
          # Test with a simple Linux container
          docker run --rm hello-world
          
          # Run a more complex example with nginx
          docker run -d --name test-nginx -p 8080:80 nginx:alpine
          
          # List running containers
          docker ps
          
          # Get nginx container logs
          docker logs test-nginx
          
          # Test container connectivity
          Start-Sleep -Seconds 5
          
          # Stop and remove container
          docker stop test-nginx
          docker rm test-nginx

      - name: Build and run custom application
        run: |
          # Create a simple Dockerfile for testing
          @"
          FROM node:18-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm install
          COPY . .
          EXPOSE 3000
          CMD ["npm", "start"]
          "@ | Out-File -FilePath Dockerfile -Encoding utf8
          
          # Create a simple package.json
          @"
          {
            "name": "test-app",
            "version": "1.0.0",
            "description": "Test application",
            "main": "index.js",
            "scripts": {
              "start": "node index.js"
            },
            "dependencies": {
              "express": "^4.18.0"
            }
          }
          "@ | Out-File -FilePath package.json -Encoding utf8
          
          # Create a simple Express app
          @"
          const express = require('express');
          const app = express();
          const port = 3000;
          
          app.get('/', (req, res) => {
            res.json({ 
              message: 'Hello from Docker on Windows via Linux sidecar!',
              timestamp: new Date().toISOString(),
              platform: process.platform,
              architecture: process.arch
            });
          });
          
          app.listen(port, '0.0.0.0', () => {
            console.log(`App listening at http://0.0.0.0:${port}`);
          });
          "@ | Out-File -FilePath index.js -Encoding utf8
          
          # Build the Docker image
          docker build -t test-app:latest .
          
          # Run the container
          docker run -d --name test-app -p 3000:3000 test-app:latest
          
          # Wait for app to start
          Start-Sleep -Seconds 10
          
          # Check if container is running
          docker ps
          docker logs test-app
          
          # Clean up
          docker stop test-app
          docker rm test-app
          docker rmi test-app:latest

      - name: Cleanup
        if: always()
        run: |
          # Clean up any remaining containers and images
          docker container prune -f
          docker image prune -f
          docker system prune -f

  # Cleanup job to terminate sidecar
  cleanup:
    runs-on: ubuntu-latest
    needs: [sidecar, windows-docker]
    if: always()
    steps:
      - name: Cleanup artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-certs
          path: /tmp/cleanup-certs

      - name: Remove certificates
        run: |
          rm -rf /tmp/cleanup-certs
          echo "Cleanup completed"