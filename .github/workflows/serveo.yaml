name: Windows Docker with Linux Sidecar

on:
  workflow_dispatch:

jobs:
  docker-sidecar:
    runs-on: ubuntu-latest
    outputs:
      docker-url: ${{ steps.serveo.outputs.docker-url }}
    steps:
      - name: Start Docker daemon with TCP binding
        run: |
          # Stop default Docker daemon
          sudo systemctl stop docker
          
          # Start Docker daemon with TCP binding (insecure for simplicity)
          sudo dockerd \
            --host=unix:///var/run/docker.sock \
            --host=tcp://0.0.0.0:2375 \
            --insecure-registry 0.0.0.0/0 \
            --tls=false &
          
          # Wait for Docker daemon to start
          sleep 10
          
          # Verify Docker is running
          docker version

      - name: Setup serveo tunnel
        id: serveo
        run: |
          # Install expect for automation
          sudo apt-get update && sudo apt-get install -y expect
          
          # Create expect script to handle serveo interaction
          cat > serveo_tunnel.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 30
          
          spawn ssh -o StrictHostKeyChecking=no -R 80:localhost:2375 serveo.net
          
          expect {
            "Forwarding HTTP traffic from" {
              # Extract the URL from the output
              expect -re "https://(\[a-zA-Z0-9\]+\.serveo\.net)"
              set url $expect_out(1,string)
              puts "DOCKER_URL=https://$url"
          
              # Keep the tunnel alive
              expect eof
            }
            "Permission denied" {
              puts "ERROR: Permission denied"
              exit 1
            }
            timeout {
              puts "ERROR: Timeout waiting for serveo"
              exit 1
            }
          }
          EOF
          
          chmod +x serveo_tunnel.exp
          
          # Run the tunnel in background and capture output
          timeout 300 ./serveo_tunnel.exp > serveo_output.log 2>&1 &
          SERVEO_PID=$!
          
          # Wait a bit for tunnel to establish
          sleep 15
          
          # Extract the URL from the log
          if grep -q "DOCKER_URL=" serveo_output.log; then
            DOCKER_URL=$(grep "DOCKER_URL=" serveo_output.log | cut -d'=' -f2)
            echo "docker-url=$DOCKER_URL" >> $GITHUB_OUTPUT
            echo "Docker daemon accessible at: $DOCKER_URL"
          else
            echo "Failed to establish serveo tunnel"
            cat serveo_output.log
            exit 1
          fi
          
          # Keep the process running for the duration of the workflow
          echo $SERVEO_PID > serveo.pid

      - name: Keep tunnel alive
        run: |
          # This step keeps running to maintain the tunnel
          # The job will continue until the workflow completes
          while kill -0 $(cat serveo.pid) 2>/dev/null; do
            sleep 30
            echo "Tunnel still active..."
          done

  windows-docker:
    runs-on: windows-latest
    needs: docker-sidecar
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker CLI
        run: |
          # Download Docker CLI for Windows
          Invoke-WebRequest -Uri "https://download.docker.com/win/static/stable/x86_64/docker-24.0.7.zip" -OutFile "docker.zip"
          Expand-Archive -Path "docker.zip" -DestinationPath "."
          
          # Add Docker to PATH
          $env:PATH += ";$PWD\docker"
          
          # Verify Docker CLI installation
          .\docker\docker.exe version --format json

      - name: Configure Docker to use remote daemon
        run: |
          $dockerUrl = "${{ needs.docker-sidecar.outputs.docker-url }}"
          
          if ([string]::IsNullOrEmpty($dockerUrl)) {
            Write-Error "Docker URL not provided from sidecar job"
            exit 1
          }
          
          Write-Host "Configuring Docker to use remote daemon at: $dockerUrl"
          
          # Set Docker host environment variable
          $env:DOCKER_HOST = $dockerUrl.Replace("https://", "tcp://").Replace("http://", "tcp://") + ":80"
          
          # For subsequent steps, we'll use the docker CLI with explicit host
          echo "DOCKER_HOST=$env:DOCKER_HOST" >> $env:GITHUB_ENV
          
          Write-Host "Docker host configured: $env:DOCKER_HOST"

      - name: Test Docker connection
        run: |
          # Test Docker connection
          .\docker\docker.exe --host $env:DOCKER_HOST version
          .\docker\docker.exe --host $env:DOCKER_HOST info

      - name: Run Linux containers on Windows
        run: |
          Write-Host "Running Linux containers from Windows job..."
          
          # Pull and run a simple Linux container
          .\docker\docker.exe --host $env:DOCKER_HOST pull alpine:latest
          .\docker\docker.exe --host $env:DOCKER_HOST run --rm alpine:latest echo "Hello from Linux container running via Windows!"
          
          # Run a more complex example with nginx
          .\docker\docker.exe --host $env:DOCKER_HOST pull nginx:alpine
          $containerId = .\docker\docker.exe --host $env:DOCKER_HOST run -d -p 8080:80 nginx:alpine
          
          Write-Host "Started nginx container: $containerId"
          
          # Wait a moment for container to start
          Start-Sleep -Seconds 5
          
          # Check if container is running
          .\docker\docker.exe --host $env:DOCKER_HOST ps
          
          # Stop the container
          .\docker\docker.exe --host $env:DOCKER_HOST stop $containerId
          Write-Host "Stopped nginx container"

      - name: Build custom Docker image
        run: |
          # Create a simple Dockerfile
          @"
          FROM ubuntu:20.04
          RUN apt-get update && apt-get install -y curl
          CMD ["echo", "Custom Linux image built from Windows!"]
          "@ | Out-File -FilePath "Dockerfile" -Encoding utf8
          
          # Build the image
          .\docker\docker.exe --host $env:DOCKER_HOST build -t custom-linux-app .
          
          # Run the custom image
          .\docker\docker.exe --host $env:DOCKER_HOST run --rm custom-linux-app

      - name: Cleanup
        if: always()
        run: |
          Write-Host "Cleaning up containers and images..."
          
          # Stop all running containers
          $containers = .\docker\docker.exe --host $env:DOCKER_HOST ps -q
          if ($containers) {
            .\docker\docker.exe --host $env:DOCKER_HOST stop $containers
          }
          
          # Remove stopped containers
          .\docker\docker.exe --host $env:DOCKER_HOST container prune -f
          
          # Remove unused images
          .\docker\docker.exe --host $env:DOCKER_HOST image prune -f