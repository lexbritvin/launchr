# This workflow sets up a remote debugging session using tunneled SSH Server
# It allows developers to connect via SSH for debugging purposes
# Features:
# - Remote SSH access to the build environment
# - Pre-installed Go debugger (Delve)
# - Support for multiple OS platforms
# - Port forwarding for debug sessions

name: 🚧 Debug with SSH
on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Debug with SSH in OS'
        required: false
        type: choice
        options:
          - 'Ubuntu LTS (amd64)'
          - 'Ubuntu LTS (arm64)'
          - 'macOS Latest (arm64)'
          - 'macOS 13 (amd64)'
          - 'Windows Latest (amd64)'
          - 'Windows Latest (arm64)'

# Opinionated defaults. Can be overridden in GitHub UI.
env:
  SSH_JUMP_HOST: ssh-j.com
  SSH_JUMP_PORT: '22'
  SSH_JUMP_USER: ':generate'
  SSH_JUMP_FORWARD: ':generate'
  SSH_JUMP_HOST_KEYS: |
    ssh-j.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIiyFQuTwegicQ+8w7dLA7A+4JMZkCk8TLWrKPklWcRt

jobs:
  select-os:
    name: 🗺 Select OS - ${{ inputs.os }}
    runs-on: ubuntu-latest
    outputs:
      runner-os: ${{ steps.map-os.outputs.runner-os }}
      os-type: ${{ steps.map-os.outputs.os-type }}
      private-key: ${{ steps.generate-key.outputs.private-key }}
      public-key: ${{ steps.generate-key.outputs.public-key }}
    steps:
      - name: Map OS selection
        id: map-os
        env:
          INPUT_OS: ${{ inputs.os }}
        run: |
          case "$INPUT_OS" in
            "Ubuntu LTS (amd64)")
              echo "runner-os=ubuntu-latest" >> $GITHUB_OUTPUT
              echo "os-type=linux" >> $GITHUB_OUTPUT
              ;;
            "Ubuntu LTS (arm64)")
              echo "runner-os=ubuntu-24.04-arm" >> $GITHUB_OUTPUT
              echo "os-type=linux" >> $GITHUB_OUTPUT
              ;;
            "macOS Latest (arm64)")
              echo "runner-os=macos-latest" >> $GITHUB_OUTPUT
              echo "os-type=macos" >> $GITHUB_OUTPUT
              ;;
            "macOS 13 (amd64)")
              echo "runner-os=macos-13" >> $GITHUB_OUTPUT
              echo "os-type=macos" >> $GITHUB_OUTPUT
              ;;
            "Windows Latest (amd64)")
              echo "runner-os=windows-latest" >> $GITHUB_OUTPUT
              echo "os-type=windows" >> $GITHUB_OUTPUT
              ;;
            "Windows Latest (arm64)")
              echo "runner-os=windows-11-arm" >> $GITHUB_OUTPUT
              echo "os-type=windows" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "runner-os=ubuntu-latest" >> $GITHUB_OUTPUT
              echo "os-type=linux" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Generate ED25519 SSH key pair
        id: generate-key
        run: |
          ssh-keygen -t ed25519 -N "" -f ./id_ed25519
  
          echo "Export private ssh key"
          {
            echo "private-key<<EOF"
            cat ./id_ed25519
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
  
          echo "public-key=$(cat ./id_ed25519.pub)" >> $GITHUB_OUTPUT

  linux-sidecar:
    name: Linux Docker Sidecar
    needs: [select-os]
    runs-on: ubuntu-latest
    if: needs.select-os.outputs.os-type != 'linux'
    steps:
      - name: Run Linux Docker sidecar
        uses: lexbritvin/docker-sidecar-action/run-sidecar@main
        with:
          ssh-server-authorized-keys: ${{ needs.select-os.outputs.public-key }}
          ssh-jump-host: ${{ env.SSH_JUMP_HOST }}
          ssh-jump-user: ${{ env.SSH_JUMP_USER }}
          ssh-jump-host-keys: ${{ env.SSH_JUMP_HOST_KEYS }}
          ssh-jump-forward: ${{ env.SSH_JUMP_FORWARD }}

      - name: ⚡ Wait for related jobs
        uses: lexbritvin/wait-action@v1
        with:
          condition-type: 'job'
          job-name: '/How to connect/'
          timeout-seconds: 1800
          poll-interval-seconds: 30

  debug-session:
    name: 👉 How to connect 👈
    needs: select-os
    runs-on: ${{ needs.select-os.outputs.runner-os || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: OS Info
        uses: lexbritvin/os-info-action@v1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up dependencies
        run: |
          if [[ "${{ runner.os }}" == "Windows" && "${{ runner.arch }}" == "ARM64" ]]; then
            echo "⚠️ WARNING: Delve debugger is not available on Windows ARM64. Remote debugging features will be limited."
          else
            go install github.com/go-delve/delve/cmd/dlv@latest
          fi
          go mod download

      # Set up the Docker sidecar environment
      - name: Set up Remote Docker
        id: docker-setup
        uses: lexbritvin/docker-sidecar-action/setup-remote-docker@main
        if: needs.select-os.outputs.os-type != 'linux'
        with:
          private-key: ${{ needs.select-os.outputs.private-key }}
          use-remote-share: 'true'

      - name: Run SSH Debug Session
        id: ssh-session
        uses: lexbritvin/ssh-session-action@v1
        with:
          ssh-jump-host: ${{ env.SSH_JUMP_HOST }}
          ssh-jump-port: ${{ env.SSH_JUMP_PORT }}
          ssh-jump-user: ${{ env.SSH_JUMP_USER }}
          ssh-jump-host-keys: ${{ env.SSH_JUMP_HOST_KEYS }}
          ssh-jump-forward: ${{ env.SSH_JUMP_FORWARD }}
          use-actor-ssh-keys: 'true'
          detached: 'true'

      - name: 👉 How to connect 👈
        env:
          HELP_MESSAGE: ${{ steps.ssh-session.outputs.help-message }}
          EXTRA_HELP: |
            ╔══════════════════════════════════════════════════════════════════════════════════════════╗
                                          🐛 GO DEBUGGING WITH DELVE                                  
            ╚══════════════════════════════════════════════════════════════════════════════════════════╝
            
            \033[1;32m┌─ 🔄 PORT FORWARDING FOR DELVE\033[0m
            \033[1;32m│\033[0m   \033[1mssh -L 2345:localhost:2345 ...\033[0m
            \033[1;32m└─\033[0m
            
            \033[1;33m┌─ 🛠️  DEBUG COMMANDS\033[0m
            \033[1;33m│\033[0m   \033[1;35mRun all tests:\033[0m
            \033[1;33m│\033[0m     \033[1mgo test ./...\033[0m
            \033[1;33m│\033[0m   \033[1;35mRun specific test:\033[0m
            \033[1;33m│\033[0m     \033[1mgo test -v -run TestFooBar ./...\033[0m
            \033[1;33m│\033[0m   \033[1;35mDebug specific test:\033[0m
            \033[1;33m│\033[0m     \033[1mdlv --listen=:2345 --headless --api-version=2 test ./... -- -test.run TestFooBar\033[0m
            \033[1;33m│\033[0m   \033[1;35mDebug application:\033[0m
            \033[1;33m│\033[0m     \033[1mdlv debug --headless --listen=:2345 --api-version=2 ./cmd/foo -- [args...]\033[0m
            \033[1;33m└─\033[0m
            
            \033[1;34m┌─ 🔗 IDE INTEGRATION\033[0m
            \033[1;34m│\033[0m   \033[1;36mConnect to Delve on port 2345:\033[0m
            \033[1;34m│\033[0m   \033[1;36m•\033[0m \033[1;35mVS Code:\033[0m https://github.com/golang/vscode-go/blob/master/docs/debugging.md
            \033[1;34m│\033[0m   \033[1;36m•\033[0m \033[1;35mGoLand/IntelliJ:\033[0m https://www.jetbrains.com/help/go/attach-to-running-go-processes-with-debugger.html#attach-to-a-process-on-a-remote-machine
            \033[1;34m└─\033[0m
            
            \033[1;36m📚 Delve Documentation:\033[0m https://github.com/go-delve/delve/tree/master/Documentation
        shell: bash
        run: |
          echo "SSH Debug Session Started!"
          # The help-message output contains ANSI color codes (\033[1;32m etc.)
          # Use printf to properly display colored output
          printf "%b\n%b\n" "$HELP_MESSAGE" "$EXTRA_HELP"
