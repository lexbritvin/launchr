# This workflow sets up a remote debugging session using TMate
# It allows developers to connect via SSH for debugging purposes
# Features:
# - Remote SSH access to the build environment
# - Pre-installed Go debugger (Delve)
# - Support for multiple OS platforms
# - Port forwarding for debug sessions

name: 🚧 Debug with SSH
on:
  workflow_dispatch:
    inputs:
      os:
        description: 'Debug with SSH in OS'
        required: false
        type: choice
        options:
          - 'Ubuntu LTS (amd64)'
          - 'Ubuntu LTS (arm64)'
          - 'macOS Latest (arm64)'
          - 'macOS 13 (amd64)'
          - 'Windows Latest (amd64)'
          - 'Windows Latest (arm64)'

jobs:
  select-os:
    name: 🗺 Select OS
    runs-on: ubuntu-latest
    outputs:
      runner-os: >-
        ${{
          inputs.os == 'Ubuntu LTS (amd64)' && 'ubuntu-latest' ||
          inputs.os == 'Ubuntu LTS (arm64)' && 'ubuntu-24.04-arm' ||
          inputs.os == 'macOS Latest (arm64)' && 'macos-latest' ||
          inputs.os == 'macOS 13 (amd64)' && 'macos-13' ||
          inputs.os == 'Windows Latest (amd64)' && 'windows-latest' ||
          inputs.os == 'Windows Latest (arm64)' && 'windows-11-arm' || ''
        }}
    steps:
      - name: Echo selected OS
        run: |
          echo "Selected OS: ${{ inputs.os }}"
          echo "Mapped to runner: ${{ needs.map-os.outputs.runner-os }}"
  
  setup-tmate:
    name: 👉 How to connect 👈
    needs: select-os
    runs-on: ${{ needs.select-os.outputs.runner-os || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: OS Info
        uses: ./.github/actions/os-info

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up dependencies
        run: |
          go install github.com/go-delve/delve/cmd/dlv@latest
          go mod download

      - name: 🛠 Set up tmate session 🛠
        id: tmate
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true
          limit-access-to-actor: true

      - name: 👉 How to connect 👈
        shell: bash
        # TODO: Add that on windows we run on a remote docker to use Linux containers and local mappings are not really supported.
        # TODO: Add that on windows by default we login with bash. For better support use PowerShell. After login, run `powershell`
        run: |
          echo -e "\e[1;36m📝 Debug Session Information\e[0m"
          echo ""
          echo -e "\e[1;31m⚠️ IMPORTANT ⚠️\e[0m"
          echo "    - SSH access is limited to the GitHub user who started this debug session"
          echo "    - Your GitHub account's SSH keys will be used for authentication"
          echo "    - Session will automatically end after disconnect"
          echo "    - Maximum session time is 30 minutes"
          echo "    - All changes are temporary and will be lost after session ends"
          echo ""
          echo -e "\e[1;36m===============================================================\e[0m"
          echo ""
          echo -e "\e[1;32m🔗 1. Connect with SSH:\e[0m"
          echo -e "      \e[1m${{ steps.tmate.outputs.ssh-command }}\e[0m"
          echo ""
          echo -e "\e[1;32m🔄 2. Forward a port to debug with Delve:\e[0m"
          echo -e "      \e[1mssh -L 2345:localhost:2345 ${{ steps.tmate.outputs.ssh-address }}\e[0m"
          echo ""
          echo -e "\e[1;32m💻 3. Connect over SSH using VS Code for full developer experience\e[0m"
          echo "      - Open VS Code"
          echo "      - Install Remote SSH and Go extensions if not installed" 
          echo "      - Select 'Remote-SSH: Connect to Host...'"
          echo "      - Enter the SSH command from step 1"
          echo ""
          echo -e "\e[1;33m🛠️ Debug commands:\e[0m"
          echo -e "\e[1m    - Run all tests:\e[0m"
          echo "        go test ./..."
          echo -e "\e[1m    - Run specific test:\e[0m"
          echo "        go --listen=:2345 --headless --api-version=2 test -v -run TestScriptBuild ./..."
          echo -e "\e[1m    - Debug specific test:\e[0m"
          echo "        dlv --listen=:2345 --headless --api-version=2 test ./... -- -test.run TestScriptCommon"
          echo -e "\e[1m    - Start debugger for the whole application:\e[0m"
          echo "        dlv debug --headless --listen=:2345 --api-version=2 ./cmd/launchr -- [args...]"
          echo ""
          echo -e "\e[1;34mConnect to Delve from local machine to port 2345.\e[0m"
          echo "  -       VS Code: https://github.com/golang/vscode-go/blob/master/docs/debugging.md"
          echo "  - JetBrains IDE: https://www.jetbrains.com/help/go/attach-to-running-go-processes-with-debugger.html#attach-to-a-process-on-a-remote-machine"
          echo ""
          echo -e "\e[1;36m📚 Delve Documentation:\e[0m"
          echo "   https://github.com/go-delve/delve/tree/master/Documentation"
          echo ""
          echo -e "\e[1;32m🚀 Happy coding! 💻 🎉\e[0m"
