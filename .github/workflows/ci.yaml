name: CI
on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'example/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      os:
        description: 'OS for tests'
        required: true
        default: '- All -'
        type: choice
        options:
          - '- All -'
          - 'Ubuntu LTS (amd64)'
          - 'Ubuntu LTS (arm64)'
          - 'macOS Latest (arm64)'
          - 'macOS 13 (amd64)'
          - 'Windows Latest (amd64)'
          - 'Windows Latest (arm64)'
      debug-enabled:
        type: boolean
        description: 'Debug with SSH. Select OS in the list!'
        required: true
        default: true

jobs:
  common-tests:
    name: Test
    uses: ./.github/workflows/common-tests.yaml
    with:
      debug-enabled: ${{ inputs.debug-enabled || false }}
      run-os: >-
        ${{
          inputs.os == 'Ubuntu LTS (amd64)' && 'ubuntu-latest' ||
          inputs.os == 'Ubuntu LTS (arm64)' && 'ubuntu-24.04-arm' ||
          inputs.os == 'macOS Latest (arm64)' && 'macos-latest' ||
          inputs.os == 'macOS 13 (amd64)' && 'macos-13' ||
          inputs.os == 'Windows Latest (amd64)' && 'windows-latest' ||
          inputs.os == 'Windows Latest (arm64)' && 'windows-11-arm' || 
          ''
        }}
